<!DOCTYPE html>
<html>
<head>
    <title>Lynk Chat</title>
    <script src="lynk/client.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; background: #f9f9f9; }
        .my-message { color: blue; }
        .other-message { color: green; }
        .system { color: gray; font-style: italic; }
    </style>
</head>
<body>
    <h1>Lynk WebSocket Chat</h1>
    <div>
        <input type="text" id="room" placeholder="Room" value="lobby">
        <button id="join">Join Room</button>
        <button id="leave">Leave Room</button>
        <span id="status"></span>
    </div>
    <div id="messages"></div>
    <div>
        <input type="text" id="message" placeholder="Type a message..." style="width: 80%;">
        <button id="send">Send</button>
    </div>

    <script>
        const client = new LynkClient('ws://localhost:8765');
        const messages = document.getElementById('messages');
        const statusSpan = document.getElementById('status');
        let currentRoom = null;

        function log(text, className) {
            const div = document.createElement('div');
            div.textContent = text;
            div.className = className || '';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        client.on('room_info', (data) => {
            currentRoom = data.room;
            statusSpan.textContent = `Connected to room: ${data.room} (${data.members.length} users)`;
            log(`* Joined room ${data.room} *`, 'system');
        });

        client.on('user_joined', (data) => {
            log(`* User ${data.id} joined *`, 'system');
        });

        client.on('user_left', (data) => {
            log(`* User ${data.id} left *`, 'system');
        });

        client.on('chat', (data) => {
            log(`${data.from}: ${data.text}`, 'other-message');
        });

        client.on('error', (data) => {
            log(`! Error: ${data.msg}`, 'system');
        });

        document.getElementById('join').addEventListener('click', async () => {
            if (!client.ws) await client.connect();
            const room = document.getElementById('room').value;
            client.emit('join', { room });
        });

        document.getElementById('leave').addEventListener('click', () => {
            if (currentRoom) {
                client.emit('leave', { room: currentRoom });
                currentRoom = null;
                statusSpan.textContent = '';
            }
        });

        document.getElementById('send').addEventListener('click', () => {
            if (!currentRoom) return alert('Join a room first');
            const text = document.getElementById('message').value;
            client.emit('message', { room: currentRoom, text });
            log(`You: ${text}`, 'my-message');
            document.getElementById('message').value = '';
        });

        // Auto-connect on page load
        window.onload = async () => {
            try {
                await client.connect();
                log('* Connected to server *', 'system');
            } catch (err) {
                log('! Connection failed', 'system');
            }
        };
    </script>
</body>
</html>
